<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 Demo Randevu Paneli</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 800px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
            position: relative;
        }

        h1::after {
            content: '';
            display: block;
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        .login-form, .panel {
            transition: all 0.3s ease;
        }

        .login-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .panel {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-top: 10px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 4px solid #c33;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 4px solid #3c3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: #f9f9f9;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #f0f0f0;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .logout-btn {
            background: #f44336;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #d32f2f;
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 0.9em;
        }

        .github-corner {
            position: absolute;
            top: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Giriş Formu -->
        <div class="login-form" id="loginForm">
            <h1>🔐 Demo Randevu Paneli</h1>
            <div class="error" id="errorMessage" style="display: none;">❌ Kullanıcı adı veya şifre yanlış!</div>
            <div class="form-group">
                <label>👤 Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="demo" value="demo">
            </div>
            <div class="form-group">
                <label>🔒 Şifre</label>
                <input type="password" id="password" placeholder="••••••" value="demo123">
            </div>
            <button class="btn" onclick="login()">Giriş Yap</button>
            <p style="text-align: center; margin-top: 15px; color: #999;">
                Demo: demo / demo123
            </p>
        </div>

        <!-- Panel -->
        <div class="panel" id="panel">
            <h1>📅 Randevu Paneli</h1>
            
            <!-- İstatistikler -->
            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalCount">0</h3>
                    <p>Toplam Randevu</p>
                </div>
                <div class="stat-card">
                    <h3 id="todayCount">0</h3>
                    <p>Bugünkü Randevu</p>
                </div>
                <div class="stat-card">
                    <h3 id="weekCount">0</h3>
                    <p>Bu Hafta</p>
                </div>
            </div>

            <!-- Randevu Listesi -->
            <h3>📋 Mevcut Randevular</h3>
            <table id="appointmentTable">
                <thead>
                    <tr>
                        <th>İsim</th>
                        <th>Tarih</th>
                        <th>Saat</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- JavaScript ile doldurulacak -->
                </tbody>
            </table>

            <!-- Yeni Randevu Ekle -->
            <h3>➕ Yeni Randevu Ekle</h3>
            <div class="form-group">
                <label>👤 İsim</label>
                <input type="text" id="newName" placeholder="Örn: Ali Yılmaz">
            </div>
            <div class="form-group">
                <label>📅 Tarih</label>
                <input type="date" id="newDate">
            </div>
            <div class="form-group">
                <label>⏰ Saat</label>
                <input type="time" id="newTime" value="10:00">
            </div>
            <button class="btn" onclick="addAppointment()">Randevu Ekle</button>
            
            <!-- Başarı Mesajı -->
            <div class="success" id="successMessage" style="display: none; margin-top: 20px;">
                ✅ Randevu başarıyla eklendi!
            </div>

            <!-- Çıkış Butonu -->
            <button class="logout-btn" onclick="logout()">🚪 Çıkış Yap</button>
        </div>
    </div>

    <script>
        // Demo randevular
        let appointments = [
            { name: 'Ali Yılmaz', date: '2026-03-05', time: '10:00' },
            { name: 'Ayşe Demir', date: '2026-03-06', time: '14:30' },
            { name: 'Mehmet Kaya', date: '2026-03-07', time: '09:15' },
            { name: 'Zeynep Çelik', date: '2026-03-08', time: '16:00' },
            { name: 'Can Yaman', date: '2026-03-09', time: '11:45' }
        ];

        // Demo kullanıcı bilgileri
        const DEMO_USER = 'demo';
        const DEMO_PASS = 'demo123';

        // Sayfa yüklendiğinde tabloyu doldur
        window.onload = function() {
            updateTable();
            
            // Bugünün tarihini varsayılan yap
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('newDate').value = today;
        };

        // Giriş fonksiyonu
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === DEMO_USER && password === DEMO_PASS) {
                // Giriş başarılı
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                updateStats();
            } else {
                // Hata göster
                const errorMsg = document.getElementById('errorMessage');
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }

        // Çıkış fonksiyonu
        function logout() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('panel').style.display = 'none';
            document.getElementById('username').value = 'demo';
            document.getElementById('password').value = 'demo123';
        }

        // Randevu ekleme
        function addAppointment() {
            const name = document.getElementById('newName').value;
            const date = document.getElementById('newDate').value;
            const time = document.getElementById('newTime').value;

            if (name && date && time) {
                appointments.push({ name, date, time });
                updateTable();
                updateStats();
                
                // Başarı mesajı göster
                const successMsg = document.getElementById('successMessage');
                successMsg.style.display = 'block';
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 2000);

                // Formu temizle
                document.getElementById('newName').value = '';
            } else {
                alert('Lütfen tüm alanları doldurun!');
            }
        }

        // Randevu silme
        function deleteAppointment(index) {
            if (confirm('Bu randevuyu silmek istediğinize emin misiniz?')) {
                appointments.splice(index, 1);
                updateTable();
                updateStats();
            }
        }

        // Tabloyu güncelle
        function updateTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            appointments.forEach((app, index) => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${app.name}</td>
                    <td>${formatDate(app.date)}</td>
                    <td>${app.time}</td>
                    <td>
                        <button onclick="deleteAppointment(${index})" 
                                style="background:#f44336; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">
                            🗑️ Sil
                        </button>
                    </td>
                `;
            });
        }

        // İstatistikleri güncelle
        function updateStats() {
            document.getElementById('totalCount').textContent = appointments.length;

            const today = new Date().toISOString().split('T')[0];
            const todayCount = appointments.filter(a => a.date === today).length;
            document.getElementById('todayCount').textContent = todayCount;

            // Bu haftaki randevular
            const weekFromNow = new Date();
            weekFromNow.setDate(weekFromNow.getDate() + 7);
            const weekCount = appointments.filter(a => {
                return a.date >= today && a.date <= weekFromNow.toISOString().split('T')[0];
            }).length;
            document.getElementById('weekCount').textContent = weekCount;
        }

        // Tarih formatlama
        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            return `${day}.${month}.${year}`;
        }
    </script>
</body>
</html>
